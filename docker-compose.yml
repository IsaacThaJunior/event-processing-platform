services:
  app:
    build:
      context: .
      dockerfile: Dockerfile  
    container_name: event-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app   # Mount local source for live reload
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: event-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: event-redis
    restart: always
    ports:
      - "6379:6379"


  prometheus:
    image: prom/prometheus
    container_name: event-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: event-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data: