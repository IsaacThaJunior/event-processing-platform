services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev  # dev Dockerfile with Air
    container_name: event-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app   # Mount local source for live reload
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: event-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: event-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: